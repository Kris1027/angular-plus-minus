<button
  type="button"
  (click)="handleToggle()"
  [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
  [attr.aria-pressed]="isDark()"
  class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg border border-stone-200 bg-white text-stone-600 shadow-sm transition hover:bg-stone-50 hover:text-stone-900 dark:border-stone-700 dark:bg-stone-800 dark:text-stone-300 dark:hover:bg-stone-700 dark:hover:text-stone-100"
>
  @if (isDark()) {
    <!-- Sun icon — shown in dark mode to indicate "switch to light" -->
    <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
      <path
        fill-rule="evenodd"
        d="M10 2a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0110 2zm4.95 2.05a.75.75 0 010 1.06l-1.06 1.06a.75.75 0 11-1.06-1.06l1.06-1.06a.75.75 0 011.06 0zM18 10a.75.75 0 01-.75.75h-1.5a.75.75 0 010-1.5h1.5A.75.75 0 0118 10zm-2.05 4.95a.75.75 0 01-1.06 0l-1.06-1.06a.75.75 0 111.06-1.06l1.06 1.06a.75.75 0 010 1.06zM10 18a.75.75 0 01-.75-.75v-1.5a.75.75 0 011.5 0v1.5A.75.75 0 0110 18zm-4.95-2.05a.75.75 0 010-1.06l1.06-1.06a.75.75 0 111.06 1.06l-1.06 1.06a.75.75 0 01-1.06 0zM2 10a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5A.75.75 0 012 10zm2.05-4.95a.75.75 0 011.06 0l1.06 1.06a.75.75 0 01-1.06 1.06L4.05 6.11a.75.75 0 010-1.06zM10 6a4 4 0 100 8 4 4 0 000-8z"
        clip-rule="evenodd"
      />
    </svg>
  } @else {
    <!-- Moon icon — shown in light mode to indicate "switch to dark" -->
    <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
      <path
        d="M7.455 2.004a.75.75 0 01.26.77 7 7 0 009.958 7.967.75.75 0 011.067.853A8.5 8.5 0 116.647 1.921a.75.75 0 01.808.083z"
      />
    </svg>
  }
</button>
