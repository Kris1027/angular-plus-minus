@let isPlus = kind() === 'plus';

<div
  cdkDrag
  class="group flex items-center gap-2 rounded-xl border px-3 py-2 shadow-sm transition hover:shadow-md"
  [class.border-jade-400]="isPlus"
  [class.bg-jade-200]="isPlus"
  [class.dark:border-jade-800]="isPlus"
  [class.dark:bg-jade-900/50]="isPlus"
  [class.border-clay-400]="!isPlus"
  [class.bg-clay-200]="!isPlus"
  [class.dark:border-clay-800]="!isPlus"
  [class.dark:bg-clay-900/50]="!isPlus"
>
  <button
    type="button"
    cdkDragHandle
    aria-label="Reorder"
    class="flex h-7 w-5 shrink-0 cursor-grab items-center justify-center text-stone-400 hover:text-stone-600 active:cursor-grabbing dark:text-stone-500 dark:hover:text-stone-300"
  >
    <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
      <circle cx="7" cy="5" r="1.4" />
      <circle cx="13" cy="5" r="1.4" />
      <circle cx="7" cy="10" r="1.4" />
      <circle cx="13" cy="10" r="1.4" />
      <circle cx="7" cy="15" r="1.4" />
      <circle cx="13" cy="15" r="1.4" />
    </svg>
  </button>

  @if (editing()) {
    <input
      #editInput
      type="text"
      class="flex-1 rounded-md border border-stone-300 bg-white px-2 py-1 text-sm text-stone-900 outline-none focus:border-stone-500 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-100 dark:focus:border-stone-500"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      (keydown.enter)="commitEdit()"
      (keydown.escape)="cancelEdit()"
      (blur)="commitEdit()"
    />
  } @else {
    <span
      class="flex-1 cursor-text text-sm text-stone-800 dark:text-stone-200"
      (dblclick)="startEdit()"
    >
      {{ item().text }}
    </span>
  }

  <div class="flex items-center gap-1 opacity-0 transition group-hover:opacity-100">
    @if (!editing()) {
      <button
        type="button"
        (click)="startEdit()"
        aria-label="Edit"
        class="rounded-md p-1 text-stone-500 hover:bg-stone-100 hover:text-stone-700 dark:text-stone-400 dark:hover:bg-stone-800 dark:hover:text-stone-200"
      >
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
          <path
            d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"
          />
        </svg>
      </button>
    }
    <button
      type="button"
      (click)="handleDelete()"
      aria-label="Delete"
      class="hover:bg-clay-50 hover:text-clay-600 dark:hover:bg-clay-900/60 dark:hover:text-clay-300 rounded-md p-1 text-stone-500 dark:text-stone-400"
    >
      <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
        <path
          fill-rule="evenodd"
          d="M8 3a1 1 0 011-1h2a1 1 0 011 1v1h4a1 1 0 110 2h-.333l-.845 11.013A2 2 0 0112.83 19H7.17a2 2 0 01-1.993-1.987L4.332 6H4a1 1 0 010-2h4V3zm2 5a1 1 0 10-2 0v7a1 1 0 102 0V8zm3 0a1 1 0 10-2 0v7a1 1 0 102 0V8z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
  </div>
</div>
