@let isPlus = kind() === 'plus';

<div
  cdkDrag
  class="group flex items-center gap-2 rounded-xl border bg-white/80 px-3 py-2 shadow-sm transition hover:shadow-md"
  [class.border-emerald-200]="isPlus"
  [class.border-rose-200]="!isPlus"
>
  <button
    type="button"
    cdkDragHandle
    aria-label="Reorder"
    class="flex h-7 w-5 shrink-0 cursor-grab items-center justify-center text-slate-400 hover:text-slate-600 active:cursor-grabbing"
  >
    <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
      <circle cx="7" cy="5" r="1.4" />
      <circle cx="13" cy="5" r="1.4" />
      <circle cx="7" cy="10" r="1.4" />
      <circle cx="13" cy="10" r="1.4" />
      <circle cx="7" cy="15" r="1.4" />
      <circle cx="13" cy="15" r="1.4" />
    </svg>
  </button>

  @if (editing()) {
    <input
      #editInput
      type="text"
      class="flex-1 rounded-md border border-slate-300 bg-white px-2 py-1 text-sm outline-none focus:border-slate-500"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      (keydown.enter)="commitEdit()"
      (keydown.escape)="cancelEdit()"
      (blur)="commitEdit()"
    />
  } @else {
    <span class="flex-1 cursor-text text-sm text-slate-800" (dblclick)="startEdit()">
      {{ item().text }}
    </span>
  }

  <div class="flex items-center gap-1 opacity-0 transition group-hover:opacity-100">
    @if (!editing()) {
      <button
        type="button"
        (click)="startEdit()"
        aria-label="Edit"
        class="rounded-md p-1 text-slate-500 hover:bg-slate-100 hover:text-slate-700"
      >
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
          <path
            d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"
          />
        </svg>
      </button>
    }
    <button
      type="button"
      (click)="handleDelete()"
      aria-label="Delete"
      class="rounded-md p-1 text-slate-500 hover:bg-rose-50 hover:text-rose-600"
    >
      <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
        <path
          fill-rule="evenodd"
          d="M8 3a1 1 0 011-1h2a1 1 0 011 1v1h4a1 1 0 110 2h-.333l-.845 11.013A2 2 0 0112.83 19H7.17a2 2 0 01-1.993-1.987L4.332 6H4a1 1 0 010-2h4V3zm2 5a1 1 0 10-2 0v7a1 1 0 102 0V8zm3 0a1 1 0 10-2 0v7a1 1 0 102 0V8z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
  </div>
</div>
