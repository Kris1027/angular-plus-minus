@let b = badge();

<section
  class="rounded-2xl border p-6 shadow-sm backdrop-blur transition-colors"
  [class.border-jade-300]="b.tone === 'jade'"
  [class.bg-jade-100]="b.tone === 'jade'"
  [class.border-clay-300]="b.tone === 'clay'"
  [class.bg-clay-100]="b.tone === 'clay'"
  [class.border-stone-400]="b.tone === 'tie'"
  [class.bg-stone-200]="b.tone === 'tie'"
  [class.border-stone-200]="b.tone === 'stone'"
  [class.bg-white/80]="b.tone === 'stone'"
>
  <div class="flex flex-col items-center gap-4 sm:flex-row sm:justify-between">
    <div class="flex items-center gap-6">
      <div class="flex flex-col items-center">
        <span class="text-jade-600 text-xs font-medium tracking-wider uppercase">Pluses</span>
        <span class="text-jade-600 text-5xl font-bold tabular-nums">{{ plusCount() }}</span>
      </div>
      <span class="text-2xl text-stone-300 italic">vs</span>
      <div class="flex flex-col items-center">
        <span class="text-clay-600 text-xs font-medium tracking-wider uppercase">Minuses</span>
        <span class="text-clay-600 text-5xl font-bold tabular-nums">{{ minusCount() }}</span>
      </div>
    </div>

    <div
      class="rounded-full border px-4 py-2 text-sm font-semibold"
      [class.border-jade-300]="b.tone === 'jade'"
      [class.bg-jade-100]="b.tone === 'jade'"
      [class.text-jade-800]="b.tone === 'jade'"
      [class.border-clay-300]="b.tone === 'clay'"
      [class.bg-clay-100]="b.tone === 'clay'"
      [class.text-clay-800]="b.tone === 'clay'"
      [class.border-stone-400]="b.tone === 'tie'"
      [class.bg-stone-200]="b.tone === 'tie'"
      [class.text-stone-800]="b.tone === 'tie'"
      [class.border-stone-200]="b.tone === 'stone'"
      [class.bg-stone-100]="b.tone === 'stone'"
      [class.text-stone-700]="b.tone === 'stone'"
    >
      {{ b.label }}
      @if (diff() !== 0) {
        <span class="ml-1 opacity-70">({{ diff() > 0 ? '+' : '' }}{{ diff() }})</span>
      }
    </div>
  </div>
</section>
