@let b = badge();

<section
  class="rounded-2xl border p-6 shadow-sm backdrop-blur transition-colors"
  [class.border-jade-400]="b.tone === 'jade'"
  [class.bg-jade-200]="b.tone === 'jade'"
  [class.dark:border-jade-700]="b.tone === 'jade'"
  [class.dark:bg-jade-900/60]="b.tone === 'jade'"
  [class.border-clay-400]="b.tone === 'clay'"
  [class.bg-clay-200]="b.tone === 'clay'"
  [class.dark:border-clay-700]="b.tone === 'clay'"
  [class.dark:bg-clay-900/60]="b.tone === 'clay'"
  [class.border-stone-400]="b.tone === 'tie'"
  [class.bg-stone-300]="b.tone === 'tie'"
  [class.dark:border-stone-600]="b.tone === 'tie'"
  [class.dark:bg-stone-800]="b.tone === 'tie'"
  [class.border-stone-300]="b.tone === 'stone'"
  [class.bg-white/90]="b.tone === 'stone'"
  [class.dark:border-stone-800]="b.tone === 'stone'"
  [class.dark:bg-stone-900/70]="b.tone === 'stone'"
>
  <div class="flex flex-col items-center gap-4 sm:flex-row sm:justify-between">
    <div class="flex items-center gap-6">
      <div class="flex flex-col items-center">
        <span class="text-jade-600 dark:text-jade-400 text-xs font-medium tracking-wider uppercase"
          >Pluses</span
        >
        <span class="text-jade-600 dark:text-jade-300 text-5xl font-bold tabular-nums">{{
          plusCount()
        }}</span>
      </div>
      <span class="text-2xl text-stone-300 italic dark:text-stone-600">vs</span>
      <div class="flex flex-col items-center">
        <span class="text-clay-600 dark:text-clay-400 text-xs font-medium tracking-wider uppercase"
          >Minuses</span
        >
        <span class="text-clay-600 dark:text-clay-300 text-5xl font-bold tabular-nums">{{
          minusCount()
        }}</span>
      </div>
    </div>

    <div
      class="rounded-full border px-4 py-2 text-sm font-semibold"
      [class.border-jade-500]="b.tone === 'jade'"
      [class.bg-jade-500]="b.tone === 'jade'"
      [class.text-white]="b.tone === 'jade' || b.tone === 'clay'"
      [class.dark:border-jade-700]="b.tone === 'jade'"
      [class.dark:bg-jade-900]="b.tone === 'jade'"
      [class.dark:text-jade-200]="b.tone === 'jade'"
      [class.border-clay-500]="b.tone === 'clay'"
      [class.bg-clay-500]="b.tone === 'clay'"
      [class.dark:border-clay-700]="b.tone === 'clay'"
      [class.dark:bg-clay-900]="b.tone === 'clay'"
      [class.dark:text-clay-200]="b.tone === 'clay'"
      [class.border-stone-500]="b.tone === 'tie'"
      [class.bg-stone-400]="b.tone === 'tie'"
      [class.text-stone-900]="b.tone === 'tie'"
      [class.dark:border-stone-600]="b.tone === 'tie'"
      [class.dark:bg-stone-700]="b.tone === 'tie'"
      [class.dark:text-stone-200]="b.tone === 'tie'"
      [class.border-stone-300]="b.tone === 'stone'"
      [class.bg-stone-200]="b.tone === 'stone'"
      [class.text-stone-700]="b.tone === 'stone'"
      [class.dark:border-stone-700]="b.tone === 'stone'"
      [class.dark:bg-stone-800]="b.tone === 'stone'"
      [class.dark:text-stone-300]="b.tone === 'stone'"
    >
      {{ b.label }}
      @if (diff() !== 0) {
        <span class="ml-1 opacity-70">({{ diff() > 0 ? '+' : '' }}{{ diff() }})</span>
      }
    </div>
  </div>
</section>
