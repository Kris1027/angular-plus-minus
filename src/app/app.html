<div
  class="from-jade-50/60 to-clay-50/70 min-h-screen bg-gradient-to-br via-stone-50 text-stone-900"
>
  <div class="mx-auto flex min-h-screen max-w-5xl flex-col gap-6 px-4 py-6 sm:px-6 sm:py-10">
    <header
      class="flex flex-row items-end justify-between gap-4 rounded-2xl border border-stone-200 bg-white/80 p-5 shadow-sm backdrop-blur"
    >
      <div class="flex min-w-0 flex-1 flex-col gap-1">
        <span class="text-xs font-semibold tracking-widest text-stone-500 uppercase">
          Plus / Minus
        </span>
        <textarea
          rows="1"
          placeholder="What are you deciding about?"
          [ngModel]="store.topic()"
          (ngModelChange)="handleTopicChange($event)"
          (keydown.enter)="handleTopicEnter($event)"
          name="topic"
          class="field-sizing-content w-full resize-none rounded-lg border border-transparent bg-transparent px-2 py-3 text-3xl leading-tight font-semibold tracking-tight text-stone-900 outline-none placeholder:text-stone-400 focus:border-stone-300 focus:bg-white sm:text-4xl"
        ></textarea>
      </div>
      <button
        type="button"
        (click)="handleReset()"
        [disabled]="!canReset()"
        class="hover:border-clay-200 hover:bg-clay-50 hover:text-clay-700 shrink-0 rounded-lg border border-stone-200 bg-white px-5 py-3 text-sm leading-[37.5px] font-medium text-stone-700 shadow-sm transition disabled:cursor-not-allowed disabled:border-stone-200 disabled:bg-white disabled:text-stone-400 disabled:shadow-none disabled:hover:border-stone-200 disabled:hover:bg-white disabled:hover:text-stone-400 sm:leading-[45px]"
      >
        Reset
      </button>
    </header>

    <main class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <app-dashboard kind="plus" />
      <app-dashboard kind="minus" />
    </main>

    <footer>
      <app-summary />
    </footer>
  </div>
</div>

<dialog
  #resetDialog
  class="m-auto w-[calc(100%-2rem)] max-w-md rounded-2xl border border-stone-200 bg-white p-0 shadow-2xl backdrop:bg-stone-900/50 backdrop:backdrop-blur-sm"
>
  <div class="p-6">
    <div class="flex items-start gap-4">
      <div
        class="bg-clay-100 text-clay-600 flex h-10 w-10 shrink-0 items-center justify-center rounded-full"
      >
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path
            fill-rule="evenodd"
            d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 9a1 1 0 100-2 1 1 0 000 2z"
            clip-rule="evenodd"
          />
        </svg>
      </div>
      <div class="flex flex-col gap-1">
        <h2 class="text-xl font-semibold text-stone-900">Reset everything?</h2>
        <p class="text-sm text-stone-600">
          This will clear the topic and all pluses and minuses. This action cannot be undone.
        </p>
      </div>
    </div>

    <form method="dialog" class="mt-6 flex justify-end gap-2">
      <button
        type="submit"
        value="cancel"
        class="rounded-lg border border-stone-200 bg-white px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-50"
      >
        Cancel
      </button>
      <button
        type="button"
        (click)="confirmReset()"
        class="bg-clay-500 hover:bg-clay-600 rounded-lg px-4 py-2 text-sm font-medium text-white shadow-sm transition"
      >
        Reset
      </button>
    </form>
  </div>
</dialog>
